<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ AIPrompter | Costruttore di Prompt Professionali</title>
    <!-- Tailwind CSS per il design -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
        /* Ottimizzazioni Mobile: disabilita tap-highlight, zoom automatici su input e zoom da doppio tocco */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }
        
        button, a, input, select, textarea {
            touch-action: manipulation;
        }
        
        button, a {
            user-select: none;
            -webkit-user-select: none;
        }
        
        input, select, textarea {
            font-size: 16px !important;
        }
</style>
    <link rel="stylesheet" href="../mobile.css">
    <style>
        @supports (padding: max(0px)) {
            body { padding-bottom: max(0px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen py-8 px-4 flex items-center justify-center">
    <!-- Torna all'Hub Floating Button -->
    <a href="../index.html" class="fixed top-4 left-4 z-50 flex items-center gap-2 px-3 py-2 bg-slate-900/80 hover:bg-slate-800 border border-slate-700/50 rounded-xl text-xs font-semibold text-slate-200 hover:text-white transition-all shadow-lg backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>Torna all'Hub</span>
    </a>


    <div
        class="max-w-6xl w-full bg-slate-800 rounded-3xl shadow-2xl border border-slate-700/50 p-6 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">

        <!-- PANNELLO CONFIGURAZIONE (SINISTRA) -->
        <div
            class="lg:col-span-6 space-y-5 border-b lg:border-b-0 lg:border-r border-slate-700/40 pb-6 lg:pb-0 lg:pr-6 max-h-[750px] overflow-y-auto pr-1">
            <div>
                <div class="flex items-center gap-1.5 mb-1">
                    <span class="text-xl">⚡</span>
                    <h1 class="text-[10px] font-bold uppercase tracking-widest text-cyan-400">AI Automation Tool</h1>
                </div>
                <h2 class="text-2xl font-black text-white">AIPrompter</h2>
                <p class="text-slate-400 text-xs mt-1">Smetti di scrivere richieste vaghe. Seleziona i blocchi logici e
                    genera un prompt ingegnerizzato perfetto per ottenere il massimo da qualsiasi modello AI.</p>
            </div>

            <!-- SELEZIONE RUOLO -->
            <div class="space-y-2">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">👤 Assegna un Ruolo /
                    Esperto</label>
                <div class="grid grid-cols-2 gap-2">
                    <select id="prompt-role"
                        class="col-span-2 bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white font-bold focus:outline-none focus:border-cyan-400 cursor-pointer">
                        <option value="un Programmatore Senior ed esperto di refactoring del codice">💻 Programmatore
                            Senior</option>
                        <option value="un Copywriter professionista esperto di marketing e SEO">✍️ Copywriter /
                            Scrittore</option>
                        <option
                            value="un Insegnante e divulgatore capace di spiegare concetti complessi in modo semplice">
                            🎓 Insegnante / Divulgatore</option>
                        <option value="un Consulente di Business e Growth Hacker aziendale">📈 Consulente Business
                        </option>
                        <option value="un Assistente Personale focalizzato sull'efficienza e l'organizzazione">📅
                            Assistente Produttività</option>
                    </select>
                </div>
            </div>

            <!-- OBIETTIVO E COMPITO -->
            <div class="space-y-2">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">🎯 Compito principale
                    (Cosa deve fare?)</label>
                <textarea id="prompt-task"
                    placeholder="Es. Analizza questo blocco di codice e trova i bug di sicurezza... o Scrivi un'email di presentazione per un cliente..."
                    class="w-full h-20 bg-slate-950 border border-slate-700 rounded-xl p-3 text-xs text-slate-200 focus:outline-none focus:border-cyan-400 resize-none font-sans leading-relaxed"></textarea>
            </div>

            <!-- CONTESTO AGGIUNTIVO -->
            <div class="space-y-2">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">📖 Dettagli o
                    Contesto Extra (Opzionale)</label>
                <textarea id="prompt-context"
                    placeholder="Inserisci qui dati di background, il testo da elaborare, o informazioni utili all'AI..."
                    class="w-full h-16 bg-slate-950 border border-slate-700 rounded-xl p-3 text-xs text-slate-300 focus:outline-none focus:border-cyan-400 resize-none font-sans leading-relaxed"></textarea>
            </div>

            <!-- FORMATO DI OUTPUT E STILE -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">📋 Formato
                        Output</label>
                    <select id="prompt-format"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-cyan-400 cursor-pointer">
                        <option value="Rispondi usando una struttura pulita a punti elenco (bullet points).">🔹 Elenco a
                            punti</option>
                        <option value="Organizza le informazioni all'interno di una tabella Markdown dettagliata.">📊
                            Tabella Markdown</option>
                        <option value="Genera un testo fluido suddiviso in paragrafi ben definiti.">📄 Testo continuo
                        </option>
                        <option
                            value="Fornisci solo ed esclusivamente il blocco di codice formattato senza spiegazioni testuali.">
                            💻 Solo Codice</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">🎭 Tono di
                        Voce</label>
                    <select id="prompt-tone"
                        class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-cyan-400 cursor-pointer">
                        <option value="Mantieni un tono professionale, autorevole e oggettivo.">💼 Professionale
                        </option>
                        <option value="Usa un tono semplice, chiaro ed esplicativo (spiega come se avessi 10 anni).">💡
                            Semplice / Eli5</option>
                        <option value="Adotta uno stile persuasivo, accattivante e orientato alla conversione.">🔥
                            Persuasivo</option>
                        <option value="Sii sintetico, conciso, dritto al punto ed elimina i convenevoli.">⚡ Diretto /
                            Minimale</option>
                    </select>
                </div>
            </div>

            <!-- VINCOLI RESTRITTIVI (CHECKBOX) -->
            <div class="space-y-2">
                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400">🚫 Vincoli e Regole
                    Rigide</label>
                <div
                    class="grid grid-cols-1 sm:grid-cols-2 gap-2 bg-slate-900/40 p-3 rounded-xl border border-slate-700/40">
                    <label class="flex items-center gap-2 text-xs text-slate-300 cursor-pointer select-none">
                        <input type="checkbox" id="rule-no-preamble"
                            class="w-3.5 h-3.5 accent-cyan-400 rounded cursor-pointer">
                        <span>No introduzioni o saluti iniziali</span>
                    </label>
                    <label class="flex items-center gap-2 text-xs text-slate-300 cursor-pointer select-none">
                        <input type="checkbox" id="rule-justify"
                            class="w-3.5 h-3.5 accent-cyan-400 rounded cursor-pointer">
                        <span>Spiega brevemente il perché delle scelte</span>
                    </label>
                    <label class="flex items-center gap-2 text-xs text-slate-300 cursor-pointer select-none">
                        <input type="checkbox" id="rule-length"
                            class="w-3.5 h-3.5 accent-cyan-400 rounded cursor-pointer">
                        <span>Rimani sotto le 150 parole</span>
                    </label>
                    <label class="flex items-center gap-2 text-xs text-slate-300 cursor-pointer select-none">
                        <input type="checkbox" id="rule-markdown"
                            class="w-3.5 h-3.5 accent-cyan-400 rounded cursor-pointer">
                        <span>Usa il grassetto per i concetti chiave</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- PANNELLO GENERATORE E ANTEPRIMA (DESTRA) -->
        <div class="lg:col-span-6 flex flex-col justify-between h-full space-y-4">
            <div class="flex-1 flex flex-col min-h-[350px]">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">🤖 Prompt Ingegnerizzato
                        Pronto</h3>
                    <button id="btn-reset"
                        class="text-[10px] text-slate-500 hover:text-rose-400 font-bold uppercase tracking-wide transition-colors cursor-pointer">Clear</button>
                </div>

                <!-- BOX ANTEPRIMA PROMPT -->
                <div class="flex-1 bg-slate-950 border border-slate-900 rounded-2xl p-4 font-mono text-[11px] text-cyan-300 overflow-y-auto leading-relaxed relative select-all whitespace-pre-wrap select-none shadow-inner"
                    id="prompt-output">
                    <!-- Compilato dinamicamente da JS -->
                </div>
            </div>

            <!-- PULSANTE DI COPIA AUTOMATICA -->
            <button id="btn-copy"
                class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black text-sm uppercase tracking-wider py-4 rounded-2xl shadow-lg transition-all transform active:scale-[0.99] cursor-pointer flex items-center justify-center gap-2">
                📋 Copia Prompt negli Appunti
            </button>
        </div>

    </div>

    <!-- LOGICA DI ASSEMBLAGGIO DEI COMPONENTI -->
    <script>
        const roleSelect = document.getElementById('prompt-role');
        const taskText = document.getElementById('prompt-task');
        const contextText = document.getElementById('prompt-context');
        const formatSelect = document.getElementById('prompt-format');
        const toneSelect = document.getElementById('prompt-tone');

        // Regole
        const ruleNoPreamble = document.getElementById('rule-no-preamble');
        const ruleJustify = document.getElementById('rule-justify');
        const ruleLength = document.getElementById('rule-length');
        const ruleMarkdown = document.getElementById('rule-markdown');

        const outputBox = document.getElementById('prompt-output');
        const btnCopy = document.getElementById('btn-copy');
        const btnReset = document.getElementById('btn-reset');

        // Funzione core di automazione: concatena i blocchi semantici in tempo reale
        function assemblaPrompt() {
            const task = taskText.value.trim();

            if (!task) {
                outputBox.innerHTML = `<span class="text-slate-600 italic">// Inizia a scrivere il compito principale nel box a sinistra per vedere la struttura del prompt ingegnerizzato...</span>`;
                return;
            }

            let promptStr = `# RUOLO\nAgisci in qualità di ${roleSelect.value}.\n\n`;
            promptStr += `# COMPITO PRINCIPALE\n${task}\n\n`;

            const contesto = contextText.value.trim();
            if (contesto) {
                promptStr += `# CONTESTO E DATI\n${contesto}\n\n`;
            }

            promptStr += `# STILE E FORMATO\n- ${formatSelect.value}\n- ${toneSelect.value}\n`;

            // Raccolta e iniezione delle regole vincolanti
            let vincoli = [];
            if (ruleNoPreamble.checked) vincoli.push("Evita assolutamente qualsiasi tipo di preambolo, saluto o commento introduttivo. Vai direttamente alla risposta.");
            if (ruleJustify.checked) vincoli.push("Giustifica brevemente il motivo logico delle tue scelte o conclusioni.");
            if (ruleLength.checked) vincoli.push("Sii estremamente conciso e rimani rigorosamente sotto le 150 parole complessive.");
            if (ruleMarkdown.checked) vincoli.push("Usa sapientemente la formattazione in grassetto di Markdown per evidenziare i concetti e le parole chiave più importanti.");

            if (vincoli.length > 0) {
                promptStr += `\n# VINCOLI RIGIDI\n`;
                vincoli.forEach(v => {
                    promptStr += `- ${v}\n`;
                });
            }

            outputBox.innerText = promptStr;

            // Memorizzazione locale dello stato dei testi
            localStorage.setItem('aiprompter_task', task);
            localStorage.setItem('aiprompter_context', contesto);
        }

        // Configura il tracciamento dei click e della digitazione su ogni elemento della dashboard
        [roleSelect, formatSelect, toneSelect].forEach(elem => elem.addEventListener('change', assemblaPrompt));
        [taskText, contextText].forEach(elem => elem.addEventListener('input', assemblaPrompt));
        [ruleNoPreamble, ruleJustify, ruleLength, ruleMarkdown].forEach(elem => elem.addEventListener('change', assemblaPrompt));

        // Pulsante di copia automatica con feedback grafico sul colore
        btnCopy.addEventListener('click', () => {
            const testoDaCopiare = outputBox.innerText;
            if (!taskText.value.trim()) return;

            navigator.clipboard.writeText(testoDaCopiare).then(() => {
                const testoOriginale = btnCopy.innerHTML;
                btnCopy.innerHTML = "✨ Prompt Copiato con Successo!";
                btnCopy.className = btnCopy.className.replace('bg-cyan-500', 'bg-emerald-500').replace('hover:bg-cyan-400', 'hover:bg-emerald-400');

                setTimeout(() => {
                    btnCopy.innerHTML = testoOriginale;
                    btnCopy.className = btnCopy.className.replace('bg-emerald-500', 'bg-cyan-500').replace('hover:bg-emerald-400', 'hover:bg-cyan-400');
                }, 1200);
            });
        });

        // Ripristino del form
        btnReset.addEventListener('click', () => {
            taskText.value = '';
            contextText.value = '';
            ruleNoPreamble.checked = false;
            ruleJustify.checked = false;
            ruleLength.checked = false;
            ruleMarkdown.checked = false;
            assemblaPrompt();
        });

        // Recupero dello storico all'avvio
        const taskSalvato = localStorage.getItem('aiprompter_task');
        const contestoSalvato = localStorage.getItem('aiprompter_context');

        if (taskSalvato) taskText.value = taskSalvato;
        if (contestoSalvato) contextText.value = contestoSalvato;

        assemblaPrompt();
    </script>

    <!-- Registrazione Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('../sw.js')
                    .then(reg => console.log('Service Worker registrato con successo per la sotto-app:', reg.scope))
                    .catch(err => console.error('Errore registrazione Service Worker sotto-app:', err));
            });
        }
    </script>
</body>

</html>
