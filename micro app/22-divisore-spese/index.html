<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📊 EquiSplit - Divisore Spese Multi-Gruppo | MicroApps Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { -webkit-tap-highlight-color: transparent; }
        html, body { touch-action: manipulation; -webkit-text-size-adjust: 100%; }
        button, a, input, select, textarea { touch-action: manipulation; }
        button, a { user-select: none; -webkit-user-select: none; }
        input, select, textarea { font-size: 16px !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(30, 41, 59, 0.6);
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.8), 0 0 25px -5px rgba(16, 185, 129, 0.1);
        }
    </style>
    <link rel="stylesheet" href="../mobile.css">
    <style>
        @supports (padding: max(0px)) {
            body { padding-bottom: max(0px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-100 font-sans antialiased min-h-screen py-8 px-4 flex items-center justify-center relative overflow-x-hidden selection:bg-emerald-500/30 selection:text-emerald-200">

    <!-- Torna all'Hub -->
    <a href="../index.html" class="fixed top-4 left-4 z-50 flex items-center gap-2 px-3 py-2 bg-slate-900/80 hover:bg-slate-800 border border-slate-700/50 rounded-xl text-xs font-semibold text-slate-200 hover:text-white transition-all shadow-lg backdrop-blur-md">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>Torna all'Hub</span>
    </a>

    <!-- Sfondo -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#1e293b_1px,transparent_1px),linear-gradient(to_bottom,#1e293b_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)] opacity-20"></div>
        <div class="absolute top-10 left-10 w-80 h-80 bg-emerald-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-10 right-10 w-80 h-80 bg-teal-500/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- Container -->
    <div class="max-w-6xl w-full bg-slate-900/80 border border-slate-800/80 rounded-3xl shadow-2xl p-6 md:p-8 space-y-6 backdrop-blur-md relative">

        <!-- Header -->
        <div class="border-b border-slate-800 pb-4">
            <div class="flex items-center gap-1.5 mb-1">
                <span class="text-xl">📊</span>
                <h1 class="text-[10px] font-bold uppercase tracking-widest text-emerald-400 font-mono-custom">Finance & Sharing</h1>
            </div>
            <h2 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">EquiSplit</h2>
            <p class="text-slate-400 text-xs mt-1">Dividi le spese per viaggi, cene o convivenze. Ora puoi gestire più gruppi separati.</p>
        </div>

        <!-- ─── GESTIONE GRUPPI ─────────────────────────────────── -->
        <div class="bg-slate-950/60 border border-slate-800/80 rounded-2xl p-4">
            <div class="flex flex-wrap items-center gap-3">
                <label class="text-[10px] font-bold uppercase tracking-wider text-slate-400 shrink-0">📁 Gruppo Attivo:</label>

                <!-- Select gruppo -->
                <select id="group-select"
                    class="flex-1 min-w-0 bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-sm text-white font-bold focus:outline-none focus:border-emerald-500 cursor-pointer">
                </select>

                <!-- Nuovo gruppo -->
                <button id="btn-new-group"
                    class="bg-emerald-700 hover:bg-emerald-600 text-white text-xs font-black px-3 py-2 rounded-xl cursor-pointer transition-colors flex items-center gap-1 shrink-0">
                    <i class="fa-solid fa-plus"></i> Nuovo Gruppo
                </button>

                <!-- Elimina gruppo -->
                <button id="btn-delete-group"
                    class="bg-rose-950/40 hover:bg-rose-900/60 text-rose-400 border border-rose-500/20 text-xs font-bold px-3 py-2 rounded-xl cursor-pointer transition-colors flex items-center gap-1 shrink-0">
                    <i class="fa-solid fa-trash"></i> Elimina
                </button>
            </div>

            <!-- Inline form nuovo gruppo -->
            <div id="new-group-form" class="hidden mt-3 flex gap-2">
                <input type="text" id="new-group-name" placeholder="Nome gruppo (es. Vacanza Giugno, Cena Roma...)"
                    class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-emerald-500">
                <button id="btn-confirm-new-group"
                    class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-4 rounded-xl cursor-pointer transition-colors shrink-0">
                    Crea
                </button>
                <button id="btn-cancel-new-group"
                    class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-bold px-3 rounded-xl cursor-pointer transition-colors shrink-0">
                    Annulla
                </button>
            </div>
        </div>

        <!-- ─── CORPO PRINCIPALE ─────────────────────────────────── -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

            <!-- COLONNA CONFIGURAZIONE (sinistra) -->
            <div class="lg:col-span-5 space-y-6">

                <!-- SEZIONE MEMBRI -->
                <div class="bg-slate-950/60 border border-slate-800/80 rounded-2xl p-5 space-y-4">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                        <i class="fa-solid fa-users text-emerald-400"></i>
                        1. Gestione Partecipanti
                    </h3>
                    <form onsubmit="aggiungiMembro(event)" class="flex gap-2">
                        <input type="text" id="new-member-name" placeholder="Nome (es. Marco)" required
                            class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-emerald-500 transition-colors">
                        <button type="submit"
                            class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-4 rounded-xl cursor-pointer transition-colors flex items-center gap-1 shrink-0">
                            Aggiungi
                        </button>
                    </form>
                    <div id="members-list" class="flex flex-wrap gap-2 max-h-24 overflow-y-auto pr-1"></div>
                </div>

                <!-- SEZIONE AGGIUNGI SPESA -->
                <div class="bg-slate-950/60 border border-slate-800/80 rounded-2xl p-5 space-y-4">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                        <i class="fa-solid fa-file-invoice-dollar text-emerald-400"></i>
                        2. Registra Nuova Spesa
                    </h3>
                    <form id="expense-form" onsubmit="aggiungiSpesa(event)" class="space-y-4">
                        <div class="space-y-1">
                            <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-400">Descrizione Spesa</label>
                            <input type="text" id="expense-desc" placeholder="es. Spesa supermercato, Benzina..." required
                                class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-emerald-500 transition-colors">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-400">Importo (€)</label>
                                <input type="number" id="expense-amount" placeholder="0.00" min="0.01" step="0.01" required
                                    class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-emerald-500 transition-colors font-mono-custom font-bold">
                            </div>
                            <div class="space-y-1">
                                <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-400">Pagato da</label>
                                <select id="expense-payer" required
                                    class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-emerald-500 cursor-pointer">
                                </select>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center">
                                <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-400">Diviso Tra</label>
                                <div class="flex gap-2">
                                    <button type="button" onclick="selezionaTuttiPartecipanti(true)" class="text-[9px] text-emerald-400 hover:underline cursor-pointer">Tutti</button>
                                    <span class="text-[9px] text-slate-600">|</span>
                                    <button type="button" onclick="selezionaTuttiPartecipanti(false)" class="text-[9px] text-slate-500 hover:underline cursor-pointer">Nessuno</button>
                                </div>
                            </div>
                            <div id="expense-participants" class="grid grid-cols-2 gap-2 bg-slate-900/60 p-3 rounded-xl border border-slate-800/80 max-h-32 overflow-y-auto"></div>
                        </div>
                        <button type="submit"
                            class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-black text-xs uppercase tracking-wider py-3.5 rounded-xl shadow-lg transition-all transform active:scale-[0.98] cursor-pointer">
                            ✨ Aggiungi Spesa
                        </button>
                    </form>
                </div>
            </div>

            <!-- COLONNA RISULTATI (destra) -->
            <div class="lg:col-span-7 flex flex-col gap-6">

                <!-- LISTA SPESE -->
                <div class="bg-slate-950/40 border border-slate-800/80 rounded-2xl p-5 flex flex-col justify-between min-h-[200px]">
                    <div class="space-y-3">
                        <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-2">
                                <i class="fa-solid fa-list-check text-emerald-400"></i>
                                Registro Spese
                            </h3>
                            <button onclick="svuotaTutto()" class="text-[10px] text-slate-500 hover:text-rose-400 font-bold transition-colors cursor-pointer">
                                Svuota tutto ×
                            </button>
                        </div>
                        <div id="expenses-list" class="overflow-y-auto max-h-[180px] space-y-2 pr-1"></div>
                    </div>
                    <div class="pt-4 border-t border-slate-800/60 flex justify-between items-center text-xs text-slate-400">
                        <span>Spese registrate: <strong id="total-expenses-count" class="text-white">0</strong></span>
                        <span>Totale: <strong id="total-expenses-sum" class="text-emerald-400 font-mono-custom font-bold">0.00 €</strong></span>
                    </div>
                </div>

                <!-- BILANCI & PAREGGI -->
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4 flex-1">
                    <div class="bg-slate-950/60 border border-slate-800/80 rounded-2xl p-5 md:col-span-5 flex flex-col">
                        <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-scale-balanced text-emerald-400"></i>
                            Stato Saldi
                        </h3>
                        <div id="balances-container" class="space-y-2.5 overflow-y-auto flex-1 max-h-[220px] pr-1"></div>
                    </div>
                    <div class="bg-slate-950/60 border border-slate-800/80 rounded-2xl p-5 md:col-span-7 flex flex-col justify-between">
                        <div>
                            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 flex items-center gap-2">
                                <i class="fa-solid fa-right-left text-emerald-400"></i>
                                Pareggi Ottimizzati
                            </h3>
                            <div id="settlements-container" class="space-y-2 overflow-y-auto max-h-[170px] pr-1 font-mono-custom text-[11px]"></div>
                        </div>
                        <div class="pt-4">
                            <button id="btn-copy-summary" onclick="copiaResoconto()"
                                class="w-full bg-slate-900 hover:bg-slate-850 text-slate-300 border border-slate-800 font-bold text-xs uppercase tracking-wider py-3 rounded-xl transition-all cursor-pointer flex items-center justify-center gap-2 hidden">
                                <i class="fa-regular fa-clipboard"></i>
                                Copia Riepilogo per WhatsApp/Telegram
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── State ─────────────────────────────────────────────────────────
        const STORAGE_KEY = 'microapps_equisplit_groups';

        function caricaDB() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        }

        function salvaDB(db) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            // Aggiorna anche la chiave legacy per il widget hub (usa il gruppo attivo)
            const gruppoAttivo = db.groups.find(g => g.id === db.activeGroupId);
            if (gruppoAttivo) {
                localStorage.setItem('microapps_equisplit_data', JSON.stringify({
                    members: gruppoAttivo.members,
                    expenses: gruppoAttivo.expenses
                }));
            }
        }

        function getGruppoAttivo(db) {
            return db.groups.find(g => g.id === db.activeGroupId) || db.groups[0];
        }

        // ─── Init DB ───────────────────────────────────────────────────────
        let db = caricaDB();

        if (!db) {
            // Controlla se ci sono dati legacy
            const legacy = JSON.parse(localStorage.getItem('microapps_equisplit_data') || 'null');
            const primoGruppo = {
                id: 'grp_' + Date.now(),
                nome: 'Gruppo Principale',
                members: (legacy && legacy.members && legacy.members.length > 0 && !legacy.members.includes('Alice')) ? legacy.members : [],
                expenses: (legacy && legacy.expenses && legacy.expenses.length > 0) ? legacy.expenses : []
            };
            db = {
                activeGroupId: primoGruppo.id,
                groups: [primoGruppo]
            };
            salvaDB(db);
        }

        // ─── Gestione Gruppi ───────────────────────────────────────────────
        const groupSelect = document.getElementById('group-select');
        const btnNewGroup = document.getElementById('btn-new-group');
        const btnDeleteGroup = document.getElementById('btn-delete-group');
        const newGroupForm = document.getElementById('new-group-form');
        const newGroupNameInput = document.getElementById('new-group-name');
        const btnConfirmNewGroup = document.getElementById('btn-confirm-new-group');
        const btnCancelNewGroup = document.getElementById('btn-cancel-new-group');

        function renderGroupSelect() {
            groupSelect.innerHTML = db.groups.map(g =>
                `<option value="${g.id}" ${g.id === db.activeGroupId ? 'selected' : ''}>${g.nome} (${g.members.length} 👤, ${g.expenses.length} 💸)</option>`
            ).join('');
        }

        groupSelect.addEventListener('change', () => {
            db.activeGroupId = groupSelect.value;
            salvaDB(db);
            renderTutto();
            renderGroupSelect();
        });

        btnNewGroup.addEventListener('click', () => {
            newGroupForm.classList.toggle('hidden');
            newGroupNameInput.focus();
        });

        btnCancelNewGroup.addEventListener('click', () => {
            newGroupForm.classList.add('hidden');
            newGroupNameInput.value = '';
        });

        btnConfirmNewGroup.addEventListener('click', () => {
            const nome = newGroupNameInput.value.trim();
            if (!nome) { alert('Inserisci un nome per il gruppo.'); return; }
            const nuovoGruppo = {
                id: 'grp_' + Date.now(),
                nome,
                members: [],
                expenses: []
            };
            db.groups.push(nuovoGruppo);
            db.activeGroupId = nuovoGruppo.id;
            salvaDB(db);
            newGroupNameInput.value = '';
            newGroupForm.classList.add('hidden');
            renderGroupSelect();
            renderTutto();
        });

        newGroupNameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); btnConfirmNewGroup.click(); }
        });

        btnDeleteGroup.addEventListener('click', () => {
            if (db.groups.length <= 1) {
                alert('Non puoi eliminare l\'unico gruppo. Creane uno nuovo prima.');
                return;
            }
            const g = getGruppoAttivo(db);
            if (!confirm(`Vuoi eliminare il gruppo "${g.nome}" con tutte le sue spese?`)) return;
            db.groups = db.groups.filter(gr => gr.id !== db.activeGroupId);
            db.activeGroupId = db.groups[0].id;
            salvaDB(db);
            renderGroupSelect();
            renderTutto();
        });

        // ─── Membri ────────────────────────────────────────────────────────
        function aggiungiMembro(e) {
            e.preventDefault();
            const input = document.getElementById('new-member-name');
            const nome = input.value.trim();
            if (!nome) return;
            const gruppo = getGruppoAttivo(db);
            if (gruppo.members.some(m => m.toLowerCase() === nome.toLowerCase())) {
                alert("Questo nome è già presente nel gruppo.");
                return;
            }
            gruppo.members.push(nome);
            input.value = '';
            salvaDB(db);
            renderTutto();
        }

        function rimuoviMembro(index) {
            const gruppo = getGruppoAttivo(db);
            const nomeMembro = gruppo.members[index];
            const haSpesePagate = gruppo.expenses.some(exp => exp.paidBy === nomeMembro);
            const haSpeseComePartecipante = gruppo.expenses.some(exp => exp.participants.includes(nomeMembro));
            if (haSpesePagate || haSpeseComePartecipante) {
                if (!confirm(`"${nomeMembro}" è coinvolto in alcune spese. Rimuovendolo verranno pulite quelle transazioni. Procedere?`)) return;
                gruppo.expenses.forEach(exp => { exp.participants = exp.participants.filter(p => p !== nomeMembro); });
                gruppo.expenses = gruppo.expenses.filter(exp => exp.paidBy !== nomeMembro);
                gruppo.expenses = gruppo.expenses.filter(exp => exp.participants.length > 0);
            }
            gruppo.members.splice(index, 1);
            salvaDB(db);
            renderTutto();
        }

        // ─── Spese ─────────────────────────────────────────────────────────
        function selezionaTuttiPartecipanti(seleziona) {
            document.querySelectorAll('.participant-checkbox').forEach(cb => cb.checked = seleziona);
        }

        function aggiungiSpesa(e) {
            e.preventDefault();
            const gruppo = getGruppoAttivo(db);
            const desc = document.getElementById('expense-desc').value.trim();
            const amount = parseFloat(document.getElementById('expense-amount').value);
            const paidBy = document.getElementById('expense-payer').value;
            const checkboxes = document.querySelectorAll('.participant-checkbox');
            const participants = [];
            checkboxes.forEach(cb => { if (cb.checked) participants.push(cb.value); });
            if (participants.length === 0) { alert("Seleziona almeno un partecipante."); return; }
            gruppo.expenses.push({ id: 'exp_' + Date.now(), desc, amount, paidBy, participants });
            document.getElementById('expense-form').reset();
            selezionaTuttiPartecipanti(true);
            salvaDB(db);
            renderTutto();
        }

        function rimuoviSpesa(id) {
            const gruppo = getGruppoAttivo(db);
            gruppo.expenses = gruppo.expenses.filter(exp => exp.id !== id);
            salvaDB(db);
            renderTutto();
        }

        function svuotaTutto() {
            const gruppo = getGruppoAttivo(db);
            if (confirm("Vuoi cancellare tutte le spese del gruppo? I partecipanti rimarranno.")) {
                gruppo.expenses = [];
                salvaDB(db);
                renderTutto();
            }
        }

        // ─── Render ────────────────────────────────────────────────────────
        function renderTutto() {
            renderGroupSelect();
            renderMembri();
            renderFormInputs();
            renderSpese();
            calcolaPareggi();
        }

        function renderMembri() {
            const list = document.getElementById('members-list');
            const gruppo = getGruppoAttivo(db);
            list.innerHTML = '';
            if (gruppo.members.length === 0) {
                list.innerHTML = `<span class="text-xs text-slate-500 italic">Nessun partecipante. Aggiungine uno sopra.</span>`;
                return;
            }
            gruppo.members.forEach((m, idx) => {
                const badge = document.createElement('div');
                badge.className = "flex items-center gap-1.5 px-3 py-1 bg-slate-900 border border-slate-800 rounded-full text-xs font-semibold text-slate-300";
                badge.innerHTML = `<span>${m}</span><button onclick="rimuoviMembro(${idx})" class="text-slate-500 hover:text-rose-400 font-bold pl-0.5 cursor-pointer" title="Rimuovi">×</button>`;
                list.appendChild(badge);
            });
        }

        function renderFormInputs() {
            const gruppo = getGruppoAttivo(db);
            const payerSelect = document.getElementById('expense-payer');
            const participantsContainer = document.getElementById('expense-participants');
            const prevSelectedPayer = payerSelect.value;
            payerSelect.innerHTML = '';
            participantsContainer.innerHTML = '';
            if (gruppo.members.length === 0) {
                payerSelect.innerHTML = `<option>Nessuno</option>`;
                participantsContainer.innerHTML = `<span class="text-[10px] text-slate-600 col-span-2 italic text-center py-2">Nessun membro disponibile</span>`;
                return;
            }
            gruppo.members.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m; opt.innerText = m;
                if (m === prevSelectedPayer) opt.selected = true;
                payerSelect.appendChild(opt);
                const wrapper = document.createElement('label');
                wrapper.className = "flex items-center gap-2 text-xs text-slate-300 hover:text-white cursor-pointer select-none py-1";
                wrapper.innerHTML = `<input type="checkbox" value="${m}" checked class="participant-checkbox accent-emerald-400 rounded cursor-pointer"><span class="truncate">${m}</span>`;
                participantsContainer.appendChild(wrapper);
            });
        }

        function renderSpese() {
            const gruppo = getGruppoAttivo(db);
            const container = document.getElementById('expenses-list');
            const totalCountSpan = document.getElementById('total-expenses-count');
            const totalSumSpan = document.getElementById('total-expenses-sum');
            container.innerHTML = '';
            let sommaTotale = 0;
            totalCountSpan.innerText = gruppo.expenses.length;
            if (gruppo.expenses.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-600 italic text-xs py-12">Nessuna spesa inserita nel registro.</div>`;
                totalSumSpan.innerText = "0.00 €";
                return;
            }
            gruppo.expenses.forEach(exp => {
                sommaTotale += exp.amount;
                const quota = (exp.amount / exp.participants.length).toFixed(2);
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 p-3 rounded-xl flex justify-between items-center gap-4 relative group";
                card.innerHTML = `
                    <div class="overflow-hidden flex-1">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-white truncate max-w-[180px] md:max-w-[240px]">${exp.desc}</span>
                            <span class="text-[9px] uppercase font-bold px-1.5 py-0.5 rounded border border-slate-800 bg-slate-950/60 text-slate-400 shrink-0">${exp.participants.length} persone</span>
                        </div>
                        <p class="text-[10px] text-slate-500 mt-1">Pagato da <span class="text-slate-300 font-bold">${exp.paidBy}</span> • ${quota}€ a testa</p>
                    </div>
                    <div class="flex items-center gap-3 shrink-0">
                        <span class="text-xs font-black text-emerald-400 font-mono-custom">${exp.amount.toFixed(2)} €</span>
                        <button onclick="rimuoviSpesa('${exp.id}')" class="text-rose-400/50 hover:text-rose-400 font-bold px-1 text-xs cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                    </div>
                `;
                container.appendChild(card);
            });
            totalSumSpan.innerText = sommaTotale.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
        }

        function calcolaPareggi() {
            const gruppo = getGruppoAttivo(db);
            const balancesContainer = document.getElementById('balances-container');
            const settlementsContainer = document.getElementById('settlements-container');
            balancesContainer.innerHTML = '';
            settlementsContainer.innerHTML = '';

            if (gruppo.members.length === 0) {
                balancesContainer.innerHTML = `<span class="text-xs text-slate-600 italic">Nessun membro.</span>`;
                settlementsContainer.innerHTML = `<div class="text-center text-slate-600 italic text-xs py-8">Nessun bilancio da calcolare.</div>`;
                return;
            }

            const netBalances = {};
            gruppo.members.forEach(m => netBalances[m] = 0);
            gruppo.expenses.forEach(exp => {
                if (netBalances[exp.paidBy] !== undefined) netBalances[exp.paidBy] += exp.amount;
                const costPerPerson = exp.amount / exp.participants.length;
                exp.participants.forEach(p => { if (netBalances[p] !== undefined) netBalances[p] -= costPerPerson; });
            });

            gruppo.members.forEach(m => {
                const bal = netBalances[m];
                const balFormatted = bal.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
                let textClass = "text-slate-300", sign = "", bgCircle = "bg-slate-900 border-slate-800";
                if (bal > 0.005) { textClass = "text-emerald-400 font-bold"; sign = "+"; bgCircle = "bg-emerald-500/10 border-emerald-500/20"; }
                else if (bal < -0.005) { textClass = "text-rose-400 font-bold"; bgCircle = "bg-rose-500/10 border-rose-500/20"; }
                const item = document.createElement('div');
                item.className = `flex justify-between items-center bg-slate-950/40 border ${bgCircle} p-2 px-3 rounded-xl`;
                item.innerHTML = `<span class="text-xs font-semibold text-slate-200 truncate max-w-[100px]">${m}</span><span class="text-xs font-mono-custom ${textClass}">${sign}${balFormatted}</span>`;
                balancesContainer.appendChild(item);
            });

            const debtors = [], creditors = [];
            for (const name in netBalances) {
                const val = netBalances[name];
                if (val > 0.005) creditors.push({ name, amount: val });
                else if (val < -0.005) debtors.push({ name, amount: Math.abs(val) });
            }
            debtors.sort((a, b) => b.amount - a.amount);
            creditors.sort((a, b) => b.amount - a.amount);

            const transfers = [];
            let dIdx = 0, cIdx = 0;
            while (dIdx < debtors.length && cIdx < creditors.length) {
                const debtor = debtors[dIdx], creditor = creditors[cIdx];
                const settleAmount = Math.min(debtor.amount, creditor.amount);
                if (settleAmount > 0.005) transfers.push({ from: debtor.name, to: creditor.name, amount: settleAmount });
                debtor.amount -= settleAmount;
                creditor.amount -= settleAmount;
                if (debtor.amount < 0.005) dIdx++;
                if (creditor.amount < 0.005) cIdx++;
            }

            const btnCopy = document.getElementById('btn-copy-summary');
            if (transfers.length === 0) {
                settlementsContainer.innerHTML = `<div class="text-center text-slate-600 italic text-xs py-12 flex flex-col items-center justify-center gap-2"><i class="fa-solid fa-circle-check text-2xl text-emerald-500/40"></i>Conti in perfetto pari!</div>`;
                btnCopy.classList.add('hidden');
                return;
            }

            btnCopy.classList.remove('hidden');
            transfers.forEach(t => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 p-2.5 rounded-xl flex items-center justify-between text-slate-300 gap-2";
                card.innerHTML = `
                    <div class="truncate flex items-center gap-1.5 flex-1">
                        <span class="text-slate-400 font-bold truncate max-w-[80px] block">${t.from}</span>
                        <span class="text-[9px] text-slate-500 font-bold uppercase px-1.5 py-0.5 rounded border border-slate-800/80 bg-slate-950 shrink-0">deve dare</span>
                        <span class="text-slate-400 font-bold truncate max-w-[80px] block">${t.to}</span>
                    </div>
                    <span class="text-xs font-black text-emerald-400 shrink-0">${t.amount.toFixed(2)} €</span>
                `;
                settlementsContainer.appendChild(card);
            });

            window.activeTransfers = transfers;
            window.activeBalances = netBalances;
        }

        function copiaResoconto() {
            if (!window.activeTransfers || window.activeTransfers.length === 0) return;
            const gruppo = getGruppoAttivo(db);
            let testo = `📊 *RIEPILOGO SPESE E PAREGGI — ${gruppo.nome} (EquiSplit)*\n\n`;
            testo += `*SALDO GENERALE:*\n`;
            for (const name in window.activeBalances) {
                const bal = window.activeBalances[name];
                testo += `• ${name}: ${bal > 0.005 ? '+' : ''}${bal.toFixed(2)}€\n`;
            }
            testo += `\n*TRANSAZIONI DI PAREGGIO CONSIGLIATE:*\n`;
            window.activeTransfers.forEach((t, i) => { testo += `${i + 1}. *${t.from}* deve dare 💸 *${t.amount.toFixed(2)}€* a *${t.to}*\n`; });
            testo += `\nGenerato automaticamente da MicroApps Hub 🚀`;
            navigator.clipboard.writeText(testo).then(() => {
                const btn = document.getElementById('btn-copy-summary');
                const origHtml = btn.innerHTML;
                btn.innerHTML = `<i class="fa-solid fa-check text-emerald-400"></i> Riepilogo copiato!`;
                btn.classList.add('border-emerald-500/40', 'text-emerald-400');
                setTimeout(() => { btn.innerHTML = origHtml; btn.classList.remove('border-emerald-500/40', 'text-emerald-400'); }, 2000);
            });
        }

        // ─── Avvio ─────────────────────────────────────────────────────────
        renderGroupSelect();
        renderTutto();
    </script>
</body>
